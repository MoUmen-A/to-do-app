<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Progress Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 420px;
            margin: 40px auto;
        }

        form {
            display: grid;
            gap: 12px;
            padding: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        label {
            display: grid;
            gap: 4px;
        }

        button {
            width: fit-content;
            padding: 8px 14px;
        }

        .message {
            margin-top: 12px;
            color: #116611;
        }
    </style>
</head>
<body>
<h2>Login</h2>
<p>Simple starter form for your progress tracking app.</p>

<form th:action="@{/login}" th:object="${loginForm}" method="post">
    <label>
        Username
        <input type="text" th:field="*{username}" placeholder="Enter username" required>
    </label>

    <label>
        Password
        <input type="password" th:field="*{password}" placeholder="Enter password" required>
    </label>

    <button type="submit">Sign In</button>
</form>

<p class="message" th:if="${message}" th:text="${message}"></p>
</body>
</html>
